<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="HuntrTable">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff3e6"/>
      <stop offset="1" stop-color="#ffd9b3"/>
    </linearGradient>
    <radialGradient id="bubble" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fef0e4"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#b3702f" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Speech bubble -->
  <g filter="url(#soft)">
    <path fill="url(#bubble)" stroke="#f1e0cf" stroke-width="4"
      d="M150 112h212c33 0 60 27 60 60v120c0 33-27 60-60 60H252l-78 64v-64h-24c-33 0-60-27-60-60V172c0-33 27-60 60-60z"/>
  </g>

  <!-- Five category dots, matching the in-app colors -->
  <g>
    <circle cx="186" cy="232" r="30" fill="#3b82f6"/>
    <circle cx="256" cy="232" r="30" fill="#8b5cf6"/>
    <circle cx="326" cy="232" r="30" fill="#22c55e"/>
    <circle cx="221" cy="296" r="30" fill="#f97316"/>
    <circle cx="291" cy="296" r="30" fill="#ef4444"/>
  </g>
</svg>
